{{- /*
Holds the secrets the Lens pods read at startup. Never committed to git;
populated from values.yaml (which itself should NOT have real secrets
checked in — override via `helm install --set` or a separate values file).
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wekams-lens.fullname" . }}-secrets
  labels:
    {{- include "wekams-lens.labels" . | nindent 4 }}
type: Opaque
stringData:
  WEKAMS_CATALOG_DB_URL: {{ include "wekams-lens.catalogDbUrl" . | quote }}
  {{- if .Values.auth.token }}
  WEKAMS_AUTH_TOKEN: {{ .Values.auth.token | quote }}
  {{- end }}
  {{- if eq .Values.llm.provider "groq" }}
  GROQ_API_KEY: {{ .Values.llm.groqApiKey | quote }}
  {{- end }}
  {{- if .Values.license.file }}
  WEKAMS_LICENSE_FILE: {{ .Values.license.file | quote }}
  {{- end }}
