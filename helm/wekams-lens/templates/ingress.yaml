{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "wekams-lens.fullname" . }}
  labels:
    {{- include "wekams-lens.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # The frontend serves /, the backend handles /api/* and /healthz.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "wekams-lens.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ include "wekams-lens.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: {{ include "wekams-lens.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "wekams-lens.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
